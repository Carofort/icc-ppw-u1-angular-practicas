<section class="gradient-surface rounded-3xl p-6 shadow-xl">
  <p class="text-xs font-bold uppercase tracking-[0.3em] text-pink-700">{{ eyebrow() }}</p>
  <h3 class="mt-2 text-2xl font-black tracking-tight">{{ title() }}</h3>
  <p class="mt-2 max-w-xl text-sm text-slate-500">{{ description() }}</p>
  <button class="btn btn-sm mt-4 border-none bg-pink-700 text-slate-100 hover:bg-pink-800">
    {{ actionLabel() }}
  </button>
</section>
